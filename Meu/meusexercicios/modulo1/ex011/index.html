<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagens dinâmicas</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon-32x32.png">
</head>
<body>
  <h1>Imagens Dinâmicas</h1>
  <h2>Aplicando a responsividade da nesta imagem</h2>
  <picture>
    <source media="(max-width: 350px)" srcset="Zenitsu300x300.jpg" type="image/jpg">
    <source media="(max-width: 750px)" srcset="Zenitsu700x700.jpg" type="image/jpg">
    <source media="(max-width: 1050px)" srcset="Zenitsu1000x1000.jpg" type="image/jpg">
    <img src="Zenitsu1000x1000.jpg" alt="A imagem flexível funciona">
  </picture>
  
  <h2>Adicionando audios</h2>
  <audio preload="metadata" controls autoplay loop>
    <source src="../ex011/midia/guanacast-33.mp3" type="audio/mpeg">
    <source src="../ex011/midia/guanacast-33.mp3" type="audio/ogg">
    <source src="./midia/guanacast-33.mp3" type="audio/wav">
    <p>Seu navegador não suporta áudio <a href="midia/guanacast-33.mp3" download="guanacast-33.mp3" type="audio/mpeg"></a></p>
  </audio>
  <h2>Adicionando Vídeos</h2>
  <video width="300" poster="Zenitsu300x300.jpg" controls autoplay>
    <source src="meu-video.webm" type="video/webm">
    <source src="meu-video.mp4" type="video/mp4">
    <source src="meu-video.ogv" type="video/ogg">
    <p>Infelizmente seu navegador não conseguiu carregar o vídeo.</p>
  </video>
  <iframe width="560" height="315" src="https://www.youtube.com/embed/9S2sTOpL_NI?si=TcGlrs-1CnwQq994" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
